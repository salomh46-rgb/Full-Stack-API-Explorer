<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full-Stack API Explorer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card hero-card">
        <div class="eyebrow">Backend Data</div>
        <h1 id="title"></h1>
        <p id="description"></p>
      </section>

      <section class="card form-card">
        <h2 id="form-title">Add a new project</h2>
        <form id="project-form" class="project-form">
          <input id="project-id" name="id" type="hidden" />
          <div class="form-row">
            <label>
              Title
              <input id="project-title" name="title" type="text" placeholder="Project title" required />
            </label>
            <label>
              Description
              <textarea id="project-description" name="description" placeholder="Project description" required></textarea>
            </label>
          </div>
          <div class="action-row">
            <button id="submit-button" type="submit">Save Project</button>
            <button id="cancel-edit" type="button" class="secondary-button hidden">Cancel</button>
          </div>
          <div id="form-message" aria-live="polite"></div>
        </form>
      </section>

      <section class="card list-card">
        <h2>Projects</h2>
        <ul id="project-list" class="project-list"></ul>
      </section>
    </main>

    <script type="module" src="/script.js"></script>
  </body>
</html>
