<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full-Stack API Explorer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f4f7fb, #dfe9f3);
      }

      .card {
        width: min(640px, 90vw);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.15);
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        color: #0f172a;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="title"></h1>
      <p id="description"></p>
    </main>

    <script type="module" src="/script.js"></script>
  </body>
</html>
